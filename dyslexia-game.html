<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>📖 Dyslexia Quest - Neuro-Inclusive Web</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 900px;
      min-height: 700px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
      color: #eee;
      overflow-x: hidden;
    }
    
    .game-container {
      padding: 20px;
      position: relative;
    }
    
    .game-header {
      text-align: center;
      margin-bottom: 24px;
    }
    
    .game-icon {
      font-size: 48px;
      animation: bounce 2s infinite;
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    .game-title {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, #6c5ce7, #a55ce7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    .game-subtitle {
      font-size: 13px;
      color: #888;
      margin-top: 5px;
    }
    
    .progress-container {
      background: #2d2d44;
      border-radius: 20px;
      height: 8px;
      margin: 20px 0;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #6c5ce7, #a55ce7);
      width: 0%;
      transition: width 0.3s ease;
      border-radius: 20px;
    }
    
    .score-badge {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(108,92,231,0.2);
      backdrop-filter: blur(10px);
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      color: #6c5ce7;
      border: 1px solid rgba(108,92,231,0.3);
      z-index: 100;
    }
    
    .game-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid rgba(108,92,231,0.2);
    }
    
    /* Game 1: Left vs Right Challenge */
    .direction-game {
      text-align: center;
    }
    
    .direction-prompt {
      font-size: 48px;
      margin: 20px;
      padding: 30px;
      background: rgba(108,92,231,0.2);
      border-radius: 20px;
    }
    
    .direction-buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin: 20px 0;
    }
    
    .direction-btn {
      padding: 15px 30px;
      font-size: 24px;
      background: #2d2d44;
      border: none;
      border-radius: 16px;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .direction-btn:hover {
      background: #6c5ce7;
      transform: scale(1.05);
    }
    
    /* Game 2: Map Reading Challenge */
    .map-game {
      text-align: center;
    }
    
    .simple-map {
      background: #2d2d44;
      border-radius: 20px;
      padding: 20px;
      margin: 20px 0;
      position: relative;
      min-height: 300px;
    }
    
    .map-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 20px;
    }
    
    .map-cell {
      background: #1a1a2e;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .map-cell:hover {
      background: #6c5ce7;
      transform: scale(1.02);
    }
    
    .map-cell.correct {
      background: #00b894;
      animation: pulse 0.5s;
    }
    
    .map-cell.wrong {
      background: #e74c3c;
      animation: shake 0.3s;
    }
    
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    
    /* Game 3: Reading Speed Challenge */
    .reading-game {
      text-align: center;
    }
    
    .reading-text {
      background: #1a1a2e;
      padding: 20px;
      border-radius: 16px;
      font-size: 18px;
      line-height: 1.6;
      margin: 20px 0;
      text-align: left;
    }
    
    .reading-timer {
      font-size: 32px;
      font-family: monospace;
      color: #6c5ce7;
      margin: 10px;
    }
    
    /* Game 4: Letter Confusion (b/d/p/q) */
    .letter-game {
      text-align: center;
    }
    
    .letter-display {
      font-size: 80px;
      margin: 20px;
      padding: 30px;
      background: rgba(108,92,231,0.2);
      border-radius: 20px;
      font-weight: bold;
    }
    
    .letter-options {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    .letter-btn {
      width: 100px;
      height: 100px;
      font-size: 48px;
      background: #2d2d44;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .letter-btn:hover {
      background: #6c5ce7;
      transform: scale(1.05);
    }
    
    /* Game 5: Memory Challenge */
    .memory-game {
      text-align: center;
    }
    
    .memory-sequence {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin: 20px;
    }
    
    .memory-item {
      width: 80px;
      height: 80px;
      background: #6c5ce7;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      animation: fadeIn 0.3s;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
    
    /* Game 6: Mental Math Challenge */
    .math-game {
      text-align: center;
    }
    
    .math-question {
      font-size: 36px;
      margin: 20px;
      padding: 30px;
      background: rgba(108,92,231,0.2);
      border-radius: 20px;
    }
    
    .math-input {
      font-size: 24px;
      padding: 12px;
      text-align: center;
      background: #2d2d44;
      border: none;
      border-radius: 12px;
      color: white;
      width: 200px;
      margin: 10px;
    }
    
    /* Response Buttons */
    .response-buttons {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    .response-btn {
      flex: 1;
      background: #2d2d44;
      border: none;
      padding: 12px;
      border-radius: 12px;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 13px;
      min-width: 100px;
    }
    
    .response-btn:hover {
      background: #6c5ce7;
      transform: translateY(-2px);
    }
    
    .next-btn {
      width: 100%;
      background: linear-gradient(135deg, #6c5ce7, #a55ce7);
      border: none;
      padding: 14px;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.2s;
      display: none;
    }
    
    .next-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(108,92,231,0.4);
    }
    
    .result-screen {
      text-align: center;
      padding: 20px;
    }
    
    .result-score-circle {
      width: 150px;
      height: 150px;
      border-radius: 75px;
      background: linear-gradient(135deg, #6c5ce7, #a55ce7);
      margin: 20px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: bold;
    }
    
    .recommendation-list {
      background: rgba(108,92,231,0.1);
      border-radius: 16px;
      padding: 16px;
      margin: 20px 0;
      text-align: left;
    }
    
    .rec-item {
      padding: 10px;
      margin: 5px 0;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .timer {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #2d2d44;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-family: monospace;
    }
    
    .feedback {
      margin-top: 10px;
      font-size: 14px;
      min-height: 50px;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="score-badge" id="scoreDisplay">📖 Score: 0/10</div>
    <div class="progress-container">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div style="font-size: 11px; color: #888; text-align: center; margin-bottom: 10px;">Camera access is used only for the first direction challenge.</div>
    <div id="gameContent"></div>
    <div class="timer" id="timer">⏱️ 0s</div>
  </div>
  <script src="dyslexia-game.js"></script>
</body>
</html>
