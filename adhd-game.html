<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>⚡ ADHD Focus Quest - Neuro-Inclusive Web</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 900px;
      min-height: 700px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
      color: #eee;
      overflow-x: hidden;
    }
    
    .game-container {
      padding: 20px;
      position: relative;
    }
    
    .game-header {
      text-align: center;
      margin-bottom: 24px;
    }
    
    .game-icon {
      font-size: 48px;
      animation: bounce 2s infinite;
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    .game-title {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, #6c5ce7, #a55ce7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    .game-subtitle {
      font-size: 13px;
      color: #888;
      margin-top: 5px;
    }
    
    .progress-container {
      background: #2d2d44;
      border-radius: 20px;
      height: 8px;
      margin: 20px 0;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #6c5ce7, #a55ce7);
      width: 0%;
      transition: width 0.3s ease;
      border-radius: 20px;
    }
    
    .score-badge {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(108,92,231,0.2);
      backdrop-filter: blur(10px);
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      color: #6c5ce7;
      border: 1px solid rgba(108,92,231,0.3);
      z-index: 100;
    }
    
    .game-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid rgba(108,92,231,0.2);
    }
    
    /* Game 1: Focus & Completion Challenge */
    .focus-game {
      text-align: center;
    }
    
    .task-progress {
      background: #2d2d44;
      border-radius: 10px;
      height: 20px;
      margin: 20px 0;
      overflow: hidden;
    }
    
    .task-fill {
      height: 100%;
      background: linear-gradient(90deg, #6c5ce7, #a55ce7);
      width: 0%;
      transition: width 0.3s;
    }
    
    .task-steps {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin: 20px 0;
    }
    
    .task-step {
      background: #1a1a2e;
      padding: 15px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 15px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .task-step:hover {
      background: #2d2d44;
      transform: translateX(5px);
    }
    
    .task-step.completed {
      background: #00b894;
      opacity: 0.7;
    }
    
    .task-check {
      width: 30px;
      height: 30px;
      border-radius: 15px;
      background: #2d2d44;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .task-step.completed .task-check {
      background: #fff;
      color: #00b894;
    }
    
    /* Game 2: Organization Challenge */
    .org-game {
      text-align: center;
    }
    
    .sort-items {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin: 20px 0;
    }
    
    .sort-item {
      background: #2d2d44;
      padding: 15px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      min-width: 80px;
    }
    
    .sort-item:hover {
      background: #6c5ce7;
      transform: scale(1.05);
    }
    
    .sort-item.placed {
      background: #00b894;
      cursor: default;
    }
    
    .sort-zones {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin: 20px 0;
    }
    
    .sort-zone {
      background: #1a1a2e;
      padding: 20px;
      border-radius: 16px;
      min-width: 150px;
      border: 2px dashed #6c5ce7;
    }
    
    /* Game 3: Memory & Appointments */
    .memory-game {
      text-align: center;
    }
    
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
      margin: 20px 0;
    }
    
    .calendar-day {
      background: #2d2d44;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
      font-size: 12px;
      cursor: pointer;
    }
    
    .calendar-day.remembered {
      background: #00b894;
    }
    
    /* Game 4: Task Avoidance Test */
    .procrastination-game {
      text-align: center;
    }
    
    .timer-display {
      font-size: 48px;
      font-family: monospace;
      color: #6c5ce7;
      margin: 20px;
    }
    
    .distraction-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 20px 0;
    }
    
    .distraction-btn {
      background: #e74c3c;
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      color: white;
      cursor: pointer;
      animation: pulse 1s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    /* Game 5: Fidget Tracking */
    .fidget-game {
      text-align: center;
    }
    
    .fidget-area {
      background: #1a1a2e;
      border-radius: 20px;
      padding: 30px;
      margin: 20px 0;
      min-height: 300px;
      cursor: crosshair;
      position: relative;
    }
    
    .fidget-tracker {
      position: absolute;
      width: 10px;
      height: 10px;
      background: #6c5ce7;
      border-radius: 5px;
      pointer-events: none;
      transition: all 0.05s;
    }
    
    .mouse-trail {
      position: fixed;
      pointer-events: none;
      z-index: 1000;
    }
    
    /* Game 6: Hyperactivity Test */
    .hyper-game {
      text-align: center;
    }
    
    .reaction-test {
      background: #2d2d44;
      border-radius: 20px;
      padding: 40px;
      margin: 20px 0;
      cursor: pointer;
      transition: all 0.1s;
    }
    
    .reaction-test.active {
      background: #00b894;
    }
    
    .reaction-test.waiting {
      background: #e74c3c;
    }
    
    .response-buttons {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    .response-btn {
      flex: 1;
      background: #2d2d44;
      border: none;
      padding: 12px;
      border-radius: 12px;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 13px;
      min-width: 100px;
    }
    
    .response-btn:hover {
      background: #6c5ce7;
      transform: translateY(-2px);
    }
    
    .next-btn {
      width: 100%;
      background: linear-gradient(135deg, #6c5ce7, #a55ce7);
      border: none;
      padding: 14px;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.2s;
      display: none;
    }
    
    .next-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(108,92,231,0.4);
    }
    
    .result-screen {
      text-align: center;
      padding: 20px;
    }
    
    .result-score-circle {
      width: 150px;
      height: 150px;
      border-radius: 75px;
      background: linear-gradient(135deg, #6c5ce7, #a55ce7);
      margin: 20px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: bold;
    }
    
    .recommendation-list {
      background: rgba(108,92,231,0.1);
      border-radius: 16px;
      padding: 16px;
      margin: 20px 0;
      text-align: left;
    }
    
    .rec-item {
      padding: 10px;
      margin: 5px 0;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .timer {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #2d2d44;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-family: monospace;
    }
    
    .feedback {
      margin-top: 10px;
      font-size: 14px;
      min-height: 50px;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="score-badge" id="scoreDisplay">⚡ Score: 0/6</div>
    <div class="progress-container">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div id="gameContent"></div>
    <div class="timer" id="timer">⏱️ 0s</div>
  </div>
  <script src="adhd-game.js"></script>
</body>
</html>
