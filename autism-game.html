<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>🧠 Sensory Adventure - Neuro-Inclusive Web</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 500px;
      min-height: 600px;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #eee;
      overflow-x: hidden;
    }
    
    .game-container {
      padding: 20px;
      position: relative;
    }
    
    /* Header */
    .game-header {
      text-align: center;
      margin-bottom: 24px;
    }
    
    .game-icon {
      font-size: 48px;
      margin-bottom: 8px;
    }
    
    .game-title {
      font-size: 20px;
      font-weight: 600;
      background: linear-gradient(135deg, #6c5ce7, #a55ce7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    .game-subtitle {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }
    
    .progress-bar {
      height: 4px;
      background: #2d2d44;
      border-radius: 2px;
      margin: 16px 0;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #6c5ce7, #a55ce7);
      width: 0%;
      transition: width 0.3s ease;
      border-radius: 2px;
    }
    
    /* Score Display */
    .score-display {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(108, 92, 231, 0.2);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      color: #6c5ce7;
    }
    
    /* Question Card */
    .question-card {
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid rgba(108,92,231,0.3);
      transition: all 0.3s ease;
    }
    
    .question-text {
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 20px;
    }
    
    /* Gamified Elements */
    .sound-game {
      text-align: center;
      padding: 20px;
    }
    
    .sound-button {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, #6c5ce7, #a55ce7);
      border: none;
      border-radius: 60px;
      font-size: 48px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin: 20px auto;
      display: block;
      box-shadow: 0 8px 24px rgba(108,92,231,0.3);
    }
    
    .sound-button:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 32px rgba(108,92,231,0.5);
    }
    
    .sound-button:active {
      transform: scale(0.98);
    }
    
    .sound-question {
      font-size: 14px;
      color: #aaa;
      margin-top: 12px;
    }
    
    /* Story Game */
    .story-card {
      background: rgba(108,92,231,0.1);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      border-left: 3px solid #6c5ce7;
    }
    
    .story-text {
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 16px;
    }
    
    .story-question {
      font-size: 14px;
      font-weight: 600;
      color: #6c5ce7;
      margin-bottom: 12px;
    }
    
    /* Emotion Recognition Game */
    .emotion-game {
      text-align: center;
    }
    
    .emotion-face {
      font-size: 80px;
      margin: 20px 0;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .emotion-face:hover {
      transform: scale(1.1);
    }
    
    .emotion-options {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    
    .emotion-btn {
      background: #2d2d44;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 13px;
    }
    
    .emotion-btn:hover {
      background: #6c5ce7;
      transform: translateY(-2px);
    }
    
    /* Attention Game (Eye Tracking Simulated) */
    .attention-game {
      text-align: center;
    }
    
    .floating-object {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #6c5ce7, #a55ce7);
      border-radius: 50%;
      margin: 30px auto;
      cursor: pointer;
      animation: float 2s ease-in-out infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      transition: all 0.1s;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    
    .attention-stats {
      font-size: 12px;
      color: #888;
      margin-top: 12px;
    }
    
    /* Response Options */
    .response-options {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    
    .response-btn {
      flex: 1;
      background: #2d2d44;
      border: none;
      padding: 12px;
      border-radius: 12px;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 13px;
      min-width: 80px;
    }
    
    .response-btn:hover {
      background: #6c5ce7;
      transform: translateY(-2px);
    }
    
    /* Next Button */
    .next-btn {
      width: 100%;
      background: linear-gradient(135deg, #6c5ce7, #a55ce7);
      border: none;
      padding: 14px;
      border-radius: 12px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 16px;
    }
    
    .next-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(108,92,231,0.4);
    }
    
    /* Result Screen */
    .result-screen {
      text-align: center;
      padding: 20px;
    }
    
    .result-score {
      font-size: 48px;
      font-weight: bold;
      margin: 20px 0;
    }
    
    .result-level {
      font-size: 18px;
      margin-bottom: 16px;
    }
    
    .result-recommendations {
      background: rgba(108,92,231,0.1);
      border-radius: 16px;
      padding: 16px;
      margin: 20px 0;
      text-align: left;
    }
    
    .result-recommendations h4 {
      margin-bottom: 12px;
      color: #6c5ce7;
    }
    
    .result-recommendations li {
      margin-bottom: 8px;
      font-size: 13px;
      list-style: none;
      padding-left: 20px;
      position: relative;
    }
    
    .result-recommendations li:before {
      content: "✨";
      position: absolute;
      left: 0;
    }
    
    .restart-btn {
      background: #2d2d44;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      color: white;
      cursor: pointer;
      margin-top: 16px;
    }
    
    /* Hidden class */
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="game-container" id="gameContainer">
    <div class="score-display" id="scoreDisplay">✨ Score: 0</div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    
    <div id="gameContent"></div>
  </div>

  <script>
    // Game State
    let currentQuestion = 0;
    let scores = [];
    let userResponses = [];
    
    // Gamified Questions
    const games = [
      {
        id: 1,
        domain: "Attention to Detail",

        question: "I usually concentrate more on the whole picture, rather than the small details.",
        gameHTML: `
          <div style="text-align: center;">
            <div style="display: flex; justify-content: center; gap: 20px; margin: 20px 0;">
              <div style="font-size: 40px; background: #2d2d44; padding: 20px; border-radius: 12px;">★ ★ ★ ★</div>
              <div style="font-size: 40px; background: #2d2d44; padding: 20px; border-radius: 12px;">★ ★ ◆ ★</div>
            </div>
            <div class="response-options">

        `
      },
      {
        id: 3,
        domain: "Attention Switching",
        type: "multitask",
        title: "🎯 The Multi-Task Challenge",
        instruction: "Let's test your attention switching!",
        question: "I find it easy to do more than one thing at once.",
        gameHTML: `
          <div style="text-align: center;">
            <div id="multitaskGame">
              <p style="margin-bottom: 16px;">Count how many times you see <span style="color:#6c5ce7;">✨</span> in 10 seconds:</p>
              <div id="multitaskDisplay" style="font-size: 48px; margin: 20px;">✨ ✨ ✨</div>
              <button id="startMultitask" class="response-btn">Start Challenge</button>
              <div class="response-options" style="margin-top: 20px;">
                <button class="response-btn" data-value="0">😵 Very hard</button>

                <button class="response-btn" data-value="3">🚀 Very easy</button>
              </div>
            </div>
          </div>
        `
      },
      {
        id: 4,
        domain: "Attention Switching",
        type: "interruption",
        title: "🔄 The Interruption Game",
        instruction: "We'll interrupt you mid-task. How quickly can you refocus?",
        question: "If there is an interruption, I can switch back to what I was doing very quickly.",
        gameHTML: `
          <div style="text-align: center;">
            <div id="interruptionGame">
              <p id="interruptionTask" style="margin-bottom: 16px;">Memorize this number: <strong style="font-size: 24px; color:#6c5ce7;">7429</strong></p>
              <button id="startInterruption" class="response-btn">Ready</button>
              <div class="response-options" style="margin-top: 20px;">
                <button class="response-btn" data-value="0">🐢 Forgot completely</button>
                <button class="response-btn" data-value="1">🤔 Struggled to remember</button>
                <button class="response-btn" data-value="2">😌 Remembered after a moment</button>
                <button class="response-btn" data-value="3">⚡ Instantly remembered</button>
              </div>
            </div>
          </div>
        `
      },
      {
        id: 5,
        domain: "Communication",
        type: "emotion",
        title: "😊 The Emotion Reader",
        instruction: "What is this person feeling?",
        question: "I find it easy to 'read between the lines' when someone is talking to me.",
        gameHTML: `
          <div class="emotion-game">
            <div class="emotion-face" id="emotionFace">😊</div>
            <div class="emotion-options" id="emotionOptions">
              <button class="emotion-btn" data-emotion="happy">Happy</button>
              <button class="emotion-btn" data-emotion="sad">Sad</button>
              <button class="emotion-btn" data-emotion="confused">Confused</button>
              <button class="emotion-btn" data-emotion="surprised">Surprised</button>
            </div>
            <div class="response-options" style="margin-top: 20px;">
              <button class="response-btn" data-value="0">😕 Very difficult</button>
              <button class="response-btn" data-value="1">🤔 A bit tricky</button>
              <button class="response-btn" data-value="2">😊 Fairly easy</button>
              <button class="response-btn" data-value="3">🎯 Very easy</button>
            </div>
          </div>
        `
      },
      {
        id: 6,
        domain: "Communication",
        type: "boredom",
        title: "👀 The Boredom Detector",
        instruction: "Watch this person. Are they getting bored?",
        question: "I know how to tell if someone listening to me is getting bored.",
        gameHTML: `
          <div style="text-align: center;">
            <div style="font-size: 60px; margin: 20px;" id="boredomFace">😐</div>
            <div class="response-options">
              <button class="response-btn" data-value="0">❌ Can't tell</button>
              <button class="response-btn" data-value="1">🤔 Maybe a little</button>
              <button class="response-btn" data-value="2">✅ Yes, clearly</button>
              <button class="response-btn" data-value="3">🎯 Definitely, very obvious</button>
            </div>
          </div>
        `
      },
      {
        id: 7,
        domain: "Imagination",
        type: "story",
        title: "📖 The Story Explorer",
        instruction: "Read this short story, then answer the question.",
        question: "When I'm reading a story, I find it difficult to work out the characters' intentions.",
        story: "Sarah gave her friend Alex a gift. Alex opened it and said 'Oh... thank you.' He put it aside and didn't look at it again. Sarah noticed and felt her smile fade.",
        storyQuestion: "How do you think Alex felt about the gift?",
        gameHTML: `
          <div>
            <div class="story-card">
              <div class="story-text" id="storyText"></div>
              <div class="story-question" id="storyQuestion"></div>
            </div>
            <div class="response-options">
              <button class="response-btn" data-value="0">🤔 Can't tell</button>
              <button class="response-btn" data-value="1">😐 Have to guess</button>
              <button class="response-btn" data-value="2">😊 Pretty clear</button>
              <button class="response-btn" data-value="3">🎯 Very obvious</button>
            </div>
          </div>
        `
      },
      {
        id: 8,
        domain: "Imagination",
        type: "collection",
        title: "📚 The Collector's Mind",
        instruction: "How do you feel about collecting information?",
        question: "I like to collect information about categories of things (e.g., types of car, types of bird).",
        gameHTML: `
          <div style="text-align: center;">
            <div style="font-size: 48px; margin: 20px;">📚📊📋</div>
            <div class="response-options">
              <button class="response-btn" data-value="0">🚫 Not interested</button>
              <button class="response-btn" data-value="1">🤷 Sometimes</button>
              <button class="response-btn" data-value="2">📝 I enjoy it</button>
              <button class="response-btn" data-value="3">🔥 I love organizing info</button>
            </div>
          </div>
        `
      },
      {
        id: 9,
        domain: "Social",
        type: "face",
        title: "🎭 The Face Reader",
        instruction: "What is this person thinking or feeling?",
        question: "I find it easy to work out what someone is thinking or feeling just by looking at their face.",
        gameHTML: `
          <div class="emotion-game">
            <div class="emotion-face" id="thinkingFace">🤔</div>
            <div class="emotion-options" id="thinkingOptions">
              <button class="emotion-btn" data-emotion="confused">Confused</button>
              <button class="emotion-btn" data-emotion="thinking">Deep in thought</button>
              <button class="emotion-btn" data-emotion="worried">Worried</button>
              <button class="emotion-btn" data-emotion="curious">Curious</button>
            </div>
            <div class="response-options" style="margin-top: 20px;">
              <button class="response-btn" data-value="0">❌ Very hard</button>
              <button class="response-btn" data-value="1">🤔 Somewhat hard</button>
              <button class="response-btn" data-value="2">✅ Fairly easy</button>
              <button class="response-btn" data-value="3">🎯 Very easy</button>
            </div>
          </div>
        `
      },
      {
        id: 10,
        domain: "Social",
        type: "intention",
        title: "🎯 The Intention Guesser",
        instruction: "Read this scenario and guess the intention.",
        question: "I find it difficult to work out people's intentions.",
        scenario: "Your coworker says, 'That's an interesting choice of outfit today.' They smile but their eyes seem distant.",
        scenarioQuestion: "What do you think their intention is?",
        gameHTML: `
          <div>
            <div class="story-card">
              <div class="story-text" id="intentionScenario"></div>
            </div>
            <div class="response-options">
              <button class="response-btn" data-value="0">🤔 Can't tell at all</button>
              <button class="response-btn" data-value="1">😐 Not sure</button>
              <button class="response-btn" data-value="2">😊 I think I understand</button>
              <button class="response-btn" data-value="3">🎯 Very clear to me</button>
            </div>
          </div>
        `
      }
    ];
    
    let currentGameData = null;
    let gameAnswers = [];
    let multitaskInterval = null;
    let interruptionTimeout = null;
    
    function loadGame() {
      const gameContent = document.getElementById('gameContent');
      const progressFill = document.getElementById('progressFill');
      const scoreDisplay = document.getElementById('scoreDisplay');
      
      const progress = ((currentQuestion) / games.length) * 100;
      progressFill.style.width = `${progress}%`;
      scoreDisplay.textContent = `✨ Score: ${scores.filter(s => s !== undefined).length}/10`;
      
      if (currentQuestion >= games.length) {
        showResults();
        return;
      }
      
      currentGameData = games[currentQuestion];
      gameContent.innerHTML = `
        <div class="game-header">
          <div class="game-icon">${currentGameData.title.split(' ')[0]}</div>
          <div class="game-title">${currentGameData.title}</div>
          <div class="game-subtitle">${currentGameData.instruction}</div>
        </div>
        <div class="question-card">
          <div class="question-text">${currentGameData.question}</div>
          ${currentGameData.gameHTML}
        </div>
        <button class="next-btn" id="nextBtn" style="display: none;">Next Challenge →</button>
      `;
      
      // Initialize game-specific logic
      initGameLogic(currentGameData);
      
      // Add response button listeners
      document.querySelectorAll('.response-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const value = parseInt(btn.dataset.value);
          if (!isNaN(value)) {
            scores[currentQuestion] = value;
            document.getElementById('nextBtn').style.display = 'block';
            
            // Disable all response buttons after selection
            document.querySelectorAll('.response-btn').forEach(b => {
              b.disabled = true;
              b.style.opacity = '0.5';
            });
          }
        });
      });
      
      document.getElementById('nextBtn').addEventListener('click', () => {
        if (scores[currentQuestion] !== undefined) {
          currentQuestion++;
          loadGame();
        }
      });
    }
    
    function initGameLogic(game) {
      if (game.type === 'sound') {
        const soundBtn = document.getElementById('playSound');
        if (soundBtn) {
          soundBtn.addEventListener('click', () => {
            // Play different frequencies based on autism level simulation
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.type = 'sine';
            oscillator.frequency.value = 880;
            gainNode.gain.value = 0.3;
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 1);
            oscillator.stop(audioContext.currentTime + 1);
            
            soundBtn.style.transform = 'scale(0.95)';
            setTimeout(() => { soundBtn.style.transform = 'scale(1)'; }, 100);
          });
        }
      }
      
      if (game.type === 'multitask') {
        const startBtn = document.getElementById('startMultitask');
        if (startBtn) {
          startBtn.addEventListener('click', () => {
            let count = 0;
            const display = document.getElementById('multitaskDisplay');
            startBtn.disabled = true;
            
            multitaskInterval = setInterval(() => {
              const stars = ['✨', '⭐', '🌟', '💫'];
              const randomStar = stars[Math.floor(Math.random() * stars.length)];
              display.innerHTML = Array(3 + Math.floor(Math.random() * 5)).fill(randomStar).join(' ');
              count++;
              if (count >= 15) {
                clearInterval(multitaskInterval);
                startBtn.textContent = 'Done!';
              }
            }, 500);
          });
        }
      }
      
      if (game.type === 'interruption') {
        const startBtn = document.getElementById('startInterruption');
        if (startBtn) {
          startBtn.addEventListener('click', () => {
            startBtn.disabled = true;
            const taskText = document.getElementById('interruptionTask');
            
            interruptionTimeout = setTimeout(() => {
              taskText.innerHTML = 'INTERRUPTION! 🔔<br>What was the number? Type it below:<br><input type="text" id="interruptionAnswer" style="margin-top:10px; padding:8px; border-radius:8px; background:#2d2d44; border:none; color:white;">';
            }, 3000);
          });
        }
      }
      
      if (game.type === 'emotion' && game.id === 5) {
        const emotions = ['😊', '😢', '😕', '😲'];
        let currentIndex = 0;
        const faceEl = document.getElementById('emotionFace');
        
        const interval = setInterval(() => {
          currentIndex = (currentIndex + 1) % emotions.length;
          faceEl.textContent = emotions[currentIndex];
        }, 2000);
        
        document.querySelectorAll('.emotion-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            clearInterval(interval);
          });
        });
      }
      
      if (game.type === 'story') {
        document.getElementById('storyText').textContent = game.story;
        document.getElementById('storyQuestion').textContent = game.storyQuestion;
      }
      
      if (game.type === 'intention') {
        document.getElementById('intentionScenario').textContent = game.scenario;
      }
    }
    
    function showResults() {
      const totalScore = scores.reduce((a, b) => a + b, 0);
      const maxScore = scores.length * 3;
      const percentage = (totalScore / maxScore) * 100;
      
      let level = '';
      let color = '';
      let recommendations = [];
      
      if (percentage <= 30) {
        level = 'Low likelihood of autism traits';
        color = '#00b894';
        recommendations = [
          'You show strong social and communication intuition',
          'You may benefit from standard accessibility features',
          'Consider using focus mode for deep work'
        ];
      } else if (percentage <= 60) {
        level = 'Moderate autism traits detected';
        color = '#fdcb6e';
        recommendations = [
          'Enable "Soft Colors" and "Remove Distractions"',
          'Try the "Reading Ruler" for better focus',
          'Jargon explainer might help with complex text'
        ];
      } else {
        level = 'High likelihood of autism traits';
        color = '#e74c3c';
        recommendations = [
          '✨ Enable ALL accessibility features',
          '🔥 Turn on "Remove Animations" for sensory comfort',
          '📖 Use AI text simplification for all content',
          '🎨 Soft colors mode recommended',
          '🔇 Consider our "Focus Mode" for distraction-free browsing'
        ];
      }
      
      const gameContent = document.getElementById('gameContent');
      gameContent.innerHTML = `
        <div class="result-screen">
          <div class="game-icon">🎮</div>
          <div class="game-title">Your Sensory Profile</div>
          <div class="result-score" style="color: ${color};">${totalScore}/${maxScore}</div>
          <div class="result-level" style="color: ${color};">${level}</div>
          <div class="result-recommendations">
            <h4>✨ Personalized Recommendations</h4>
            <ul>
              ${recommendations.map(rec => `<li>${rec}</li>`).join('')}
            </ul>
          </div>
          <button id="applySettings" class="next-btn" style="background: linear-gradient(135deg, #00b894, #00cec9);">Apply These Settings & Start Browsing</button>
          <button id="restartGame" class="restart-btn">🔄 Take Assessment Again</button>
        </div>
      `;
      
      document.getElementById('applySettings').addEventListener('click', () => {
        // Calculate and apply settings based on score
        const settings = {
          softColors: percentage > 40,
          removeDistractions: percentage > 30,
          readingRuler: percentage > 50,
          removeAnimations: percentage > 60,
          simplifyText: percentage > 50,
          jargonExplainer: percentage > 40,
          dyslexicFont: false
        };
        
        chrome.storage.local.set({
          onboardingCompleted: true,
          userProfile: { autism: percentage, gameScore: totalScore },
          ...settings
        }, () => {
          window.close();
        });
      });
      
      document.getElementById('restartGame').addEventListener('click', () => {
        currentQuestion = 0;
        scores = [];
        loadGame();
      });
    }
    
    // Start the game
    loadGame();
  </script>
</body>
</html>
